<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>椭圆分形生成器</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

<style>

body{
margin:0;
background:#0a0a0a;
display:flex;
flex-direction:column;
align-items:center;
font-family:sans-serif;
color:#eee;
}

#controls{
padding:12px;
display:flex;
gap:20px;
align-items:center;
}

button{
padding:6px 16px;
background:#333;
color:#eee;
border:1px solid #555;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#555;
}

</style>
</head>

<body>

<div id="controls">

<label>
覆盖阈值 <span id="threshVal">0.85</span>
<input type="range" id="threshold" min="0.3" max="1.0" step="0.01" value="0.85">
</label>

<label>
最多椭圆 <span id="maxEVal">40</span>
<input type="range" id="maxE" min="5" max="100" step="1" value="40">
</label>

<label>
图片
<select id="imgSelect" onchange="switchImage(this.value)">
  <option value="bailu">白鹭</option>
  <option value="lu">鹿</option>
  <option value="he">鹤</option>
  <option value="tu">兔</option>
  <option value="canglu">苍鹭</option>
</select>
</label>

<label>
<input type="checkbox" id="showGrid" checked>
显示骨架
</label>

<button onclick="regenerate()">重新生成</button>

</div>

<div id="canvas-container"></div>

<script src="sketch.js"></script>

</body>
</html>
