<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Animal Puzzle</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
html, body { width: 100%; height: 100%; background: #001738; font-family: sans-serif; color: #eee; overflow: hidden; }
canvas { touch-action: none; }
button { padding: 6px 14px; background: #0a2a5a; color: #eee; border: 1px solid #2a4a8a; border-radius: 4px; cursor: pointer; touch-action: manipulation; }
button:hover, button.active { background: #1a3a7a; border-color: #a4e1ff; }
#play-btn { background: #1a4a2a; border-color: #4aff8a; color: #4aff8a; font-weight: bold; }
#mute-btn { min-width: 36px; }
#zoom-out, #zoom-reset, #zoom-in { padding: 4px 10px; font-size: 13px; }
#tips { font-size: 11px; color: #6a9abf; padding: 4px 8px; opacity: 0.8; }

/* 全屏视口，负责拖动 */
#viewport { position: fixed; inset: 0; overflow: hidden; cursor: grab; }
#viewport.dragging { cursor: grabbing; }

/* 游戏容器，负责缩放 */
#gameContainer {
  position: absolute;
  transform-origin: 0 0;
  display: flex; flex-direction: column; align-items: center;
}

#controls { padding: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center; }
#game-area { display: flex; gap: 0; }
#canvas-container { position: relative; }
#panel { display: none; width: 0; background: #000d24; border-left: 1px solid #1a3a6a; overflow-y: auto; padding: 10px; transition: width 0.3s; }
#panel.open { display: flex; flex-direction: column; width: 220px; }
#panel-title { color: #a4e1ff; font-size: 13px; margin-bottom: 8px; }
#ellipse-library { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 4px; align-items: center; justify-items: center; }
#panel-actions { display:flex; gap:6px; margin: 8px 0; }
#panel-actions button { flex:1; padding:4px 8px; font-size:12px; }
#hint-btn { background:#1a3a6a; border-color:#a4e1ff; color:#a4e1ff; }
#ref-panel { margin-top: 4px; }
#ref-img { width:100%; height:140px; object-fit:contain; display:none; background:transparent; }
#lock-btn, #back-btn { display:none; position:fixed; z-index:600; padding:4px 12px; font-size:12px; background:#1a3a6a; border:1px solid #a4e1ff; color:#a4e1ff; border-radius:4px; cursor:pointer; }
#lock-btn.locked { background:#1a4a2a; border-color:#4aff8a; color:#4aff8a; }
#complete-msg { position:fixed; top:40%; left:50%; transform:translate(-50%,-50%); font-size:32px; color:#4aff8a; pointer-events:none; display:none; z-index:800; text-shadow:0 0 20px #4aff8a; }
#complete-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; display:none; z-index:700; }
#complete-overlay img { width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity 0.6s; }
</style>
</head>
<body>
<div id="viewport">
  <div id="gameContainer">
    <div id="controls">
      <button onclick="switchAnimal('lu')" class="active">鹿</button>
      <button onclick="switchAnimal('gezi')">鸽子</button>
      <button onclick="switchAnimal('tuzi')">兔子</button>
      <button onclick="switchAnimal('he')">鹤</button>
      <button onclick="switchAnimal('e')">鹅</button>
      <button onclick="switchAnimal('canglu')">苍鹭</button>
      <button id="play-btn" onclick="togglePlay()">▶ PLAY</button>
      <button id="mute-btn" onclick="toggleMute()" title="静音/开启音乐">🔊</button>
      <button id="zoom-out" onclick="zoomOut()">−</button>
      <button id="zoom-reset" onclick="zoomReset()" title="复位到初始状态">⌂</button>
      <button id="zoom-in" onclick="zoomIn()">+</button>
      <span id="tips">长按旋转 · 双击变宽 · 三击变窄 · 选中可 Lock</span>
    </div>
    <audio id="bgm" src="water dreams.m4a" loop preload="auto" autoplay></audio>
    <div id="game-area">
      <div id="canvas-container">
        <div id="complete-overlay"><img id="complete-img" src="" alt=""></div>
      </div>
      <div id="panel">
        <div id="panel-title">椭圆组件库</div>
        <div id="ellipse-library"></div>
        <div id="panel-actions">
          <button onclick="resetAnimal()">Reset</button>
          <button onclick="autoPlace()" style="background:#1a3a6a;border-color:#a4e1ff;color:#a4e1ff;">Auto</button>
          <button id="hint-btn" onclick="showHint()">Hint</button>
        </div>
        <div id="ref-panel"><img id="ref-img" src="" alt=""></div>
      </div>
    </div>
  </div>
</div>
<div id="complete-msg"></div>
<button id="lock-btn" onclick="toggleLockSelected()">Lock</button>
<button id="back-btn" onclick="backToLibrary()">Back</button>
<script src="sketch.js"></script>
<script src="game.js"></script>
<script>
const bgm = document.getElementById('bgm')
bgm.volume = 0.5
window.addEventListener('load', () => {
  bgm.play().catch(() => {
    document.addEventListener('click', () => bgm.play(), { once: true })
  })
})
function toggleMute() {
  bgm.muted = !bgm.muted
  document.getElementById('mute-btn').textContent = bgm.muted ? '🔇' : '🔊'
  if (!bgm.muted && bgm.paused) bgm.play()
}

// ── 缩放 + 平移 ──
const viewport     = document.getElementById('viewport')
const gameContainer = document.getElementById('gameContainer')
let zoomLevel = 1, tx = 0, ty = 0

function applyTransform() {
  gameContainer.style.transform = `translate(${tx}px,${ty}px) scale(${zoomLevel})`
  document.getElementById('zoom-reset').textContent = Math.round(zoomLevel * 100) + '%'
}

function fitToScreen() {
  requestAnimationFrame(() => {
    const vw = window.innerWidth, vh = window.innerHeight
    const cw = gameContainer.offsetWidth, ch = gameContainer.offsetHeight
    if (!cw || !ch) return
    zoomLevel = Math.min(vw / cw, vh / ch) * 0.92  // 留8%边距
    tx = (vw - cw * zoomLevel) / 2
    ty = (vh - ch * zoomLevel) / 2
    applyTransform()
  })
}

function zoomAt(delta, cx, cy) {
  const prev = zoomLevel
  zoomLevel = Math.min(2, Math.max(0.2, +(zoomLevel + delta).toFixed(2)))
  // 以屏幕点(cx,cy)为中心缩放
  tx = cx - (cx - tx) * (zoomLevel / prev)
  ty = cy - (cy - ty) * (zoomLevel / prev)
  applyTransform()
}

function zoomIn()    { zoomAt(+0.1, window.innerWidth/2, window.innerHeight/2) }
function zoomOut()   { zoomAt(-0.1, window.innerWidth/2, window.innerHeight/2) }
function zoomReset() { fitToScreen() }

window.addEventListener('load', () => setTimeout(fitToScreen, 300))
window.addEventListener('resize', fitToScreen)

// ── 拖动平移（单指/鼠标，排除 canvas 和 panel 内的操作）──
let panStart = null, panMoved = false
viewport.addEventListener('pointerdown', e => {
  if (e.target.closest('#canvas-container') || e.target.closest('#panel')) return
  if (e.target.closest('button')) return
  panStart = { x: e.clientX - tx, y: e.clientY - ty, id: e.pointerId }
  panMoved = false
  viewport.setPointerCapture(e.pointerId)
  viewport.classList.add('dragging')
})
viewport.addEventListener('pointermove', e => {
  if (!panStart || e.pointerId !== panStart.id) return
  const nx = e.clientX - panStart.x, ny = e.clientY - panStart.y
  if (!panMoved && Math.hypot(nx - tx, ny - ty) < 8) return
  panMoved = true
  tx = nx; ty = ny
  applyTransform()
})
viewport.addEventListener('pointerup',     () => { panStart = null; viewport.classList.remove('dragging') })
viewport.addEventListener('pointercancel', () => { panStart = null; viewport.classList.remove('dragging') })

// ── 双指 Pinch Zoom（以屏幕中心缩放）──
let pinchDist0 = null, pinchZoom0 = 1
document.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1]
    pinchDist0 = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY)
    pinchZoom0 = zoomLevel
  }
}, { passive: true })
document.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchDist0) {
    const t0 = e.touches[0], t1 = e.touches[1]
    const d = Math.hypot(t0.clientX - t1.clientX, t0.clientY - t1.clientY)
    const prev = zoomLevel
    zoomLevel = Math.min(2, Math.max(0.2, pinchZoom0 * d / pinchDist0))
    // 以屏幕中心为缩放基点
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2
    tx = cx - (cx - tx) * (zoomLevel / prev)
    ty = cy - (cy - ty) * (zoomLevel / prev)
    applyTransform()
  }
}, { passive: true })
document.addEventListener('touchend', e => { if (e.touches.length < 2) pinchDist0 = null })

// ── 鼠标滚轮缩放 ──
viewport.addEventListener('wheel', e => {
  e.preventDefault()
  zoomAt(e.deltaY < 0 ? 0.1 : -0.1, e.clientX, e.clientY)
}, { passive: false })

document.addEventListener('contextmenu', e => e.preventDefault())
document.addEventListener('dblclick',    e => e.preventDefault())
</script>
</body>
</html>
